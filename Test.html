<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Sungpil Yoon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Times New Roman", serif;
            background-color: #ffffff;
        }

        /* Sidebar Navigation */
        .sidenav {
            width: 20%;
            position: fixed;
            top: 5px;
            left: 15px;
            background: #ffffff;
            padding: 20px 10px;
        }

        .sidenav a {
            display: block;
            padding: 10px;
            font-size: 12px;
            color: #000;
            text-decoration: none;
            transition: color 0.2s ease-in-out;
        }

        .sidenav a:hover {
            color: #340df8;
        }

        /* Main Content */
        .main {
            margin-left: 22%;
            width: 75%;
            padding: 20px;
            font-size: 14px;
        }

        /* Image Optimization */
        .main img {
            max-width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px;
        }

        /* Responsive Design */
        @media screen and (max-width: 800px) {
            .main {
                width: 75%;
                margin-left: 0;
                padding: 10px;
            }
        }

        @media screen and (max-width: 550px) {
            .sidenav, .main {
                width: 100%;
                position: relative;
            }
        }
    </style>
</head>
