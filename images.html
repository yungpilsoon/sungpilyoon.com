<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#128225; Sungpil Yoon</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
}

body {
    font-family: "Times", serif;
    background-color: #000;
    position: relative;
}

/* LEFT SIDEBAR (Top Left) */
.sidenav {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 250px;
    padding: 20px 10px;
    text-align: left;
}

.sidenav a {
    display: block;
    padding: 8px 0;
    font-size: 16px;
    color: #bababa;
    text-decoration: none;
    transition: color 0.2s ease;
}

.sidenav a:hover {
    color: #fff;
}

/* RIGHT SIDEBAR (Bottom Right) */
.right-sidebar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 250px;
    padding: 20px 10px;
    text-align: right;
}

.right-sidebar a {
    display: block;
    padding: 6px 0;
    font-size: 14px;
    color: #bababa;
    text-decoration: none;
}

.right-sidebar a:hover {
    color: #fff;
}

/* MAIN CENTER CONTAINER */
.main-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
}

.main {
    max-width: 950px;
    width: 100%;
}

/* IMAGE SCALING */
.main img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
}

/* TABLET */
@media (max-width: 1024px) {
    .sidenav, .right-sidebar {
        width: 200px;
    }
}

/* MOBILE */
@media (max-width: 768px) {

    .sidenav {
        position: static;
        width: 100%;
        text-align: center;
        margin-bottom: 20px;
    }

    .right-sidebar {
        position: static;
        width: 100%;
        text-align: center;
        margin-top: 20px;
    }

    .main-container {
        flex-direction: column;
        justify-content: flex-start;
        min-height: auto;
        padding: 20px;
    }

    .main {
        max-width: 100%;
    }
}
</style>
</head>

<body>

<!-- LEFT SIDEBAR -->
<div class="sidenav">
    <a href="/index.html"><font size="4">Sungpil Yoon</font></a>
    <a href="/images.html"><i>Images (ongoing)</i></a>
</div>

<!-- MAIN CONTENT -->
<script>
const images = [
    "08CC7DC3-97C5-42B8-9220-6145DECEDCF5-33465-00001BDE5425C822_1776.jpeg",
    "image2.jpg",
    "image3.jpg",
    "image4.jpg"
];

let currentIndex = -1;
let preloadQueue = [...images]; // copy array

// shuffle preload order (so it's not predictable)
preloadQueue.sort(() => Math.random() - 0.5);

// progressively preload images
function preloadNext() {
    if (preloadQueue.length === 0) return;

    const src = preloadQueue.shift();
    const img = new Image();
    img.src = src;

    img.onload = () => {
        // wait a bit before loading next (prevents network burst)
        setTimeout(preloadNext, 300);
    };
}

// change image with fade
function changeImage() {
    let newIndex;

    do {
        newIndex = Math.floor(Math.random() * images.length);
    } while (newIndex === currentIndex);

    currentIndex = newIndex;

    const mainImg = document.getElementById("main-image");

    mainImg.style.opacity = 0;

    setTimeout(() => {
        mainImg.src = images[newIndex];
        mainImg.style.opacity = 1;
    }, 150);
}

// initial load
window.onload = () => {
    changeImage();   // show image immediately
    preloadNext();   // start background loading
};
</script>

<!-- RIGHT SIDEBAR -->
<div class="right-sidebar">
    <a href="mailto:website@sungpilyoon.com">Contact</a>
    <a href="https://www.instagram.com/environmentsampler/">☎</a>
</div>

</body>
</html>
