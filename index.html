<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <Title>&#128225; 윤성필</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0px;
            padding: 0px;
        }

        body {
            font-family: "Times", serif;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sidebar Navigation - Above Main Content */
        .sidenav {
            width: 350px;
            position: fixed;
            top: 45px;
            left: 3%;
            background-color: transparent;
            padding: 5px;
            text-align: left;
        }

        .sidenav a {
            display: block;
            padding: 10px;
            font-size: 16px;
            color: #bababa;
            text-decoration: none;
            transition: color 0.2s ease-in-out;
        }

        .sidenav a:hover {
            color: #bababa;
        }

        /* Right Bottom Sidebar */
        .right-sidebar {
            width: 250px;
            position: fixed;
            right: 3%;
            bottom: 20px;
            background-color: transparent;
            padding: 10px;
            text-align: right;
        }

        .right-sidebar a {
            display: block;
            padding: 6px 0;
            font-size: 14px;
            color: #bababa;
            text-decoration: none;
        }

        .right-sidebar a:hover {
            color: #bababa;
        }

        /* Main Content - Always Centered */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            margin-top: 45px;
        }

        .main {
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            text-align: center;
        }

        /* Image Optimization */
        .main img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 50px;
        }

        /* Responsive Design */
        @media screen and (max-width: 1200px) {
            .sidenav {
                position: relative;
                width: 100%;
                left: 0;
                text-align: center;
                padding: 15px 0;
                top: 0;
            }

            .main-container {
                flex-direction: column;
                margin-top: 300px;
            }

            .main {
                width: 100%;
            }

            /* Right sidebar becomes bottom content */
            .right-sidebar {
                position: relative;
                width: 100%;
                text-align: center;
                bottom: auto;
                right: auto;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidenav">
        <a href="/index.html"><font size="5">Sungpil Yoon</font></a>
        <br>
        <a href="/images.html"><i>Images (ongoing)</i></a>
        <a href=""></a>
        <br>
        <br><br><br>
     
    </div>

    <!-- Main Content - Always Centered -->
    <div class="main-container">
        <div class="main">
            
        </div>
    </div>

    <!-- Right Bottom Sidebar -->
    <div class="right-sidebar">
        <a href="mailto:website@sungpilyoon.com">Contact</a>
        <a href="https://www.instagram.com/environmentsampler/">@</a>
        <a href="#"></a>
    </div>

</body>
</html>
